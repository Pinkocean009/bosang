<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ร่มบ่อสร้าง - E-Book การ์ตูน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 40%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Sarabun', 'TH Sarabun New', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* Decorative background elements */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(120,40,200,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,100,50,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  .title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .title-bar h1 {
    color: #FFD700;
    font-size: clamp(14px, 3vw, 22px);
    font-weight: 700;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
  }

  .title-bar .subtitle {
    color: rgba(255,255,255,0.7);
    font-size: clamp(10px, 2vw, 14px);
  }

  /* Book container */
  .book-scene {
    perspective: 2000px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    padding-top: 50px;
    padding-bottom: 70px;
  }

  .book-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Single page display */
  .page-display {
    position: relative;
    width: min(90vw, calc((100vh - 130px) * 0.75));
    height: min(calc(90vw / 0.75), calc(100vh - 130px));
    max-width: 600px;
    max-height: 800px;
  }

  .page-container {
    width: 100%;
    height: 100%;
    position: relative;
    border-radius: 4px 12px 12px 4px;
    overflow: hidden;
    box-shadow:
      -5px 0 15px rgba(0,0,0,0.5),
      5px 5px 25px rgba(0,0,0,0.7),
      0 0 60px rgba(255,200,100,0.1);
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.1s ease;
  }

  .page-container:hover {
    transform: scale(1.005);
  }

  .page-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Page turn overlay effect */
  .page-turn-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background: linear-gradient(
      to right,
      transparent 70%,
      rgba(0,0,0,0.05) 85%,
      rgba(0,0,0,0.15) 100%
    );
    border-radius: 4px 12px 12px 4px;
  }

  /* Flip animation */
  @keyframes flipForward {
    0% { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
    50% { transform: perspective(1200px) rotateY(-90deg); opacity: 0.3; }
    100% { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
  }

  @keyframes flipBackward {
    0% { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
    50% { transform: perspective(1200px) rotateY(90deg); opacity: 0.3; }
    100% { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
  }

  .flipping-forward { animation: flipForward 0.5s ease-in-out; }
  .flipping-backward { animation: flipBackward 0.5s ease-in-out; }

  /* Navigation arrows */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
    border: 2px solid rgba(255,255,255,0.3);
    color: white;
    width: clamp(36px, 5vw, 50px);
    height: clamp(36px, 5vw, 50px);
    border-radius: 50%;
    font-size: clamp(16px, 2.5vw, 24px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    z-index: 10;
  }

  .nav-btn:hover {
    background: rgba(255,215,0,0.3);
    border-color: #FFD700;
    transform: translateY(-50%) scale(1.1);
  }

  .nav-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
    transform: translateY(-50%);
  }

  .btn-prev { left: -clamp(46px, 7vw, 65px); }
  .btn-next { right: -clamp(46px, 7vw, 65px); }

  /* Bottom controls */
  .controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    z-index: 100;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .page-indicator {
    color: rgba(255,255,255,0.9);
    font-size: clamp(12px, 2.5vw, 16px);
    font-weight: 600;
    white-space: nowrap;
  }

  .page-dots {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
    flex: 1;
  }

  .dot {
    width: clamp(6px, 1.5vw, 10px);
    height: clamp(6px, 1.5vw, 10px);
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .dot.active {
    background: #FFD700;
    transform: scale(1.3);
    box-shadow: 0 0 6px rgba(255,215,0,0.6);
  }

  .dot:hover { background: rgba(255,215,0,0.6); }

  /* Audio controls */
  .audio-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .audio-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Sarabun', sans-serif;
    font-size: clamp(11px, 2vw, 14px);
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .audio-btn:hover {
    background: rgba(255,215,0,0.3);
    border-color: #FFD700;
  }

  .audio-btn.playing {
    background: rgba(255,100,100,0.4);
    border-color: #ff6464;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 5px rgba(255,100,100,0.3); }
    50% { box-shadow: 0 0 15px rgba(255,100,100,0.7); }
  }

  /* Audio wave indicator */
  .audio-wave {
    display: none;
    align-items: center;
    gap: 2px;
    height: 20px;
  }

  .audio-wave.visible { display: flex; }

  .wave-bar {
    width: 3px;
    background: #FFD700;
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }

  .wave-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .wave-bar:nth-child(3) { height: 18px; animation-delay: 0.3s; }
  .wave-bar:nth-child(4) { height: 14px; animation-delay: 0.45s; }
  .wave-bar:nth-child(5) { height: 8px; animation-delay: 0.6s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); }
    50% { transform: scaleY(1); }
  }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,5,20,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s ease;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-title {
    color: #FFD700;
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 700;
    text-align: center;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
  }

  .loading-sub {
    color: rgba(255,255,255,0.7);
    font-size: clamp(14px, 2.5vw, 20px);
    margin-bottom: 30px;
  }

  .loading-bar-wrap {
    width: 200px;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 15px;
  }

  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, #FFD700, #FF8C00);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .loading-text {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
  }

  /* Start button */
  .start-btn {
    display: none;
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    color: #1a0a2e;
    border: none;
    padding: 14px 36px;
    border-radius: 30px;
    font-size: clamp(16px, 3vw, 22px);
    font-family: 'Sarabun', sans-serif;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    box-shadow: 0 4px 20px rgba(255,215,0,0.4);
    transition: all 0.2s ease;
  }

  .start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 30px rgba(255,215,0,0.6);
  }

  /* Hint text */
  .hint-text {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: clamp(10px, 1.8vw, 13px);
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
    z-index: 50;
  }

  /* Touch swipe indicator */
  @keyframes swipeHint {
    0% { opacity: 0; transform: translateX(-50%) translateX(-20px); }
    50% { opacity: 0.6; transform: translateX(-50%) translateX(0px); }
    100% { opacity: 0; transform: translateX(-50%) translateX(20px); }
  }

  .swipe-hint {
    animation: swipeHint 2s ease-in-out 3;
  }

  /* Responsive adjustments */
  @media (max-width: 480px) {
    .btn-prev { left: -40px; }
    .btn-next { right: -40px; }
    .controls { padding: 6px 10px; }
  }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-title">📖 ร่มบ่อสร้าง</div>
  <div class="loading-sub">การ์ตูนความรู้สำหรับ ป.5</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loadingBar"></div>
  </div>
  <div class="loading-text" id="loadingText">กำลังโหลด...</div>
  <button class="start-btn" id="startBtn" onclick="startBook()">▶ เริ่มอ่าน</button>
</div>

<!-- Title Bar -->
<div class="title-bar">
  <h1>📖 ร่มบ่อสร้าง</h1>
  <span class="subtitle">การ์ตูนความรู้ ป.5</span>
</div>

<!-- Book Scene -->
<div class="book-scene">
  <div class="book-wrapper">
    <button class="nav-btn btn-prev" id="btnPrev" onclick="prevPage()" disabled>◀</button>

    <div class="page-display">
      <div class="page-container" id="pageContainer" onclick="nextPage()">
        <img class="page-img" id="pageImg" src="page01.png" alt="หน้า 1">
        <div class="page-turn-overlay"></div>
      </div>
    </div>

    <button class="nav-btn btn-next" id="btnNext" onclick="nextPage()">▶</button>
  </div>
</div>

<!-- Hint -->
<div class="hint-text" id="hintText">คลิกที่ภาพหรือกดลูกศร เพื่อเปิดหน้าถัดไป</div>

<!-- Bottom Controls -->
<div class="controls">
  <div class="page-indicator" id="pageIndicator">หน้า 1 / 10</div>

  <div class="page-dots" id="pageDots"></div>

  <div class="audio-controls">
    <div class="audio-wave" id="audioWave">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <button class="audio-btn" id="audioBtn" onclick="toggleAudio()">🔊 เล่นเสียง</button>
  </div>
</div>

<audio id="audioPlayer" preload="none"></audio>

<script>
const TOTAL_PAGES = 10;
let currentPage = 1;
let isFlipping = false;
let audioEnabled = true;
let isPlaying = false;
let imagesLoaded = 0;
let allImagesLoaded = false;

const pages = Array.from({length: TOTAL_PAGES}, (_, i) => `page${String(i+1).padStart(2,'0')}.png`);
const audios = Array.from({length: TOTAL_PAGES}, (_, i) => `audio/page${String(i+1).padStart(2,'0')}.mp3`);

// Page titles for indicator
const pageTitles = [
  'ปก', 'ตื่นตาตื่นใจ', 'พบคุณยาย', 'วัสดุทำร่ม',
  'ลองทำโครง', 'ติดกระดาษสา', 'วาดลาย', 'ลงมือวาด',
  'ผลงานสำเร็จ', 'อำลา'
];

// Preload images
function preloadImages() {
  const imgs = [];
  pages.forEach((src, idx) => {
    const img = new Image();
    img.onload = () => {
      imagesLoaded++;
      const pct = Math.round((imagesLoaded / TOTAL_PAGES) * 100);
      document.getElementById('loadingBar').style.width = pct + '%';
      document.getElementById('loadingText').textContent = `โหลดภาพ ${imagesLoaded}/${TOTAL_PAGES}...`;
      if (imagesLoaded >= TOTAL_PAGES) {
        allImagesLoaded = true;
        document.getElementById('loadingText').textContent = 'โหลดเสร็จแล้ว! พร้อมอ่าน';
        document.getElementById('startBtn').style.display = 'block';
      }
    };
    img.onerror = () => {
      imagesLoaded++;
      if (imagesLoaded >= TOTAL_PAGES) {
        allImagesLoaded = true;
        document.getElementById('startBtn').style.display = 'block';
      }
    };
    img.src = src;
    imgs.push(img);
  });
}

function startBook() {
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('hidden');
  setTimeout(() => overlay.style.display = 'none', 500);
  updatePage(1);
  // Auto-play audio for first page after short delay
  setTimeout(() => {
    if (audioEnabled) playPageAudio(1);
  }, 800);
}

// Build dots
function buildDots() {
  const container = document.getElementById('pageDots');
  container.innerHTML = '';
  for (let i = 1; i <= TOTAL_PAGES; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 1 ? ' active' : '');
    dot.title = `หน้า ${i}: ${pageTitles[i-1]}`;
    dot.onclick = () => goToPage(i);
    container.appendChild(dot);
  }
}

function updateDots(page) {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i + 1 === page);
  });
}

function updatePage(page) {
  currentPage = page;
  document.getElementById('pageImg').src = pages[page - 1];
  document.getElementById('pageIndicator').textContent = `หน้า ${page} / ${TOTAL_PAGES} — ${pageTitles[page-1]}`;
  document.getElementById('btnPrev').disabled = page <= 1;
  document.getElementById('btnNext').disabled = page >= TOTAL_PAGES;
  updateDots(page);
  stopAudio();
}

function flipToPage(newPage, direction) {
  if (isFlipping) return;
  if (newPage < 1 || newPage > TOTAL_PAGES) return;
  isFlipping = true;

  const container = document.getElementById('pageContainer');
  const cls = direction === 'forward' ? 'flipping-forward' : 'flipping-backward';

  container.classList.add(cls);

  // Change image at midpoint
  setTimeout(() => {
    updatePage(newPage);
    if (audioEnabled) playPageAudio(newPage);
  }, 250);

  setTimeout(() => {
    container.classList.remove(cls);
    isFlipping = false;
  }, 500);
}

function nextPage() {
  if (currentPage < TOTAL_PAGES) flipToPage(currentPage + 1, 'forward');
}

function prevPage() {
  if (currentPage > 1) flipToPage(currentPage - 1, 'backward');
}

function goToPage(page) {
  if (page === currentPage) return;
  const dir = page > currentPage ? 'forward' : 'backward';
  flipToPage(page, dir);
}

// Audio
const audioPlayer = document.getElementById('audioPlayer');

function playPageAudio(page) {
  stopAudio();
  const src = audios[page - 1];
  audioPlayer.src = src;
  audioPlayer.load();
  const playPromise = audioPlayer.play();
  if (playPromise !== undefined) {
    playPromise.then(() => {
      isPlaying = true;
      updateAudioUI(true);
    }).catch(() => {
      isPlaying = false;
      updateAudioUI(false);
    });
  }
}

function stopAudio() {
  audioPlayer.pause();
  audioPlayer.currentTime = 0;
  isPlaying = false;
  updateAudioUI(false);
}

function toggleAudio() {
  if (isPlaying) {
    stopAudio();
    audioEnabled = false;
  } else {
    audioEnabled = true;
    playPageAudio(currentPage);
  }
}

function updateAudioUI(playing) {
  const btn = document.getElementById('audioBtn');
  const wave = document.getElementById('audioWave');
  if (playing) {
    btn.textContent = '⏹ หยุดเสียง';
    btn.classList.add('playing');
    wave.classList.add('visible');
  } else {
    btn.textContent = '🔊 เล่นเสียง';
    btn.classList.remove('playing');
    wave.classList.remove('visible');
  }
}

audioPlayer.addEventListener('ended', () => {
  isPlaying = false;
  updateAudioUI(false);
});

audioPlayer.addEventListener('error', () => {
  isPlaying = false;
  updateAudioUI(false);
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault();
    nextPage();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    prevPage();
  }
});

// Touch/swipe support
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) nextPage();
    else prevPage();
  }
}, { passive: true });

// Init
buildDots();
preloadImages();
</script>
</body>
</html>
